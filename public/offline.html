<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#17251f" />
    <title>Offline · Inner Compass</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f2ec;
        color: #17251f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
        background: #f4f2ec;
      }

      main {
        width: min(100%, 34rem);
        padding: clamp(28px, 8vw, 48px);
        border: 1px solid #d4cec0;
        border-radius: 28px;
        background: #fffefa;
        box-shadow: 0 20px 60px rgb(23 37 31 / 10%);
      }

      svg {
        width: 52px;
        height: 52px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.75rem, 8vw, 2.5rem);
        line-height: 1.08;
        letter-spacing: -0.035em;
      }

      p {
        margin: 0 0 28px;
        color: #526159;
        font-size: 1rem;
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border-radius: 999px;
        background: #17251f;
        color: #fffefa;
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid #c58c5b;
        outline-offset: 4px;
      }

      @media (prefers-color-scheme: dark) {
        :root,
        body {
          background: #101814;
          color: #f4efe3;
        }

        main {
          border-color: #37483f;
          background: #17251f;
          box-shadow: none;
        }

        p {
          color: #b9c3bc;
        }

        a {
          background: #f4efe3;
          color: #17251f;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <circle cx="32" cy="32" r="27" fill="none" stroke="currentColor" stroke-width="3" />
        <path d="m32 11 8 21-8 21-8-21Z" fill="currentColor" />
        <path d="m32 11 8 21-8-4Z" fill="#c58c5b" />
      </svg>
      <h1>Gerade kein Netz.</h1>
      <p>
        Bereits geladene Bereiche und deine lokalen Daten können weiter verfügbar sein. Für diese Seite
        braucht Inner Compass einmal eine Verbindung.
      </p>
      <a href="/">Erneut versuchen</a>
    </main>
  </body>
</html>
